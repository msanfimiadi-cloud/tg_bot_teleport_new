services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: teleport
      POSTGRES_USER: teleport
      POSTGRES_PASSWORD: teleport
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teleport -d teleport"]
      interval: 5s
      timeout: 3s
      retries: 10
  bot:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    command: sh -c "alembic upgrade head && python -m teleport_bot.main"
volumes:
  postgres_data:
